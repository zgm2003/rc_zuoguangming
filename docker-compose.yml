services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notify_user
      POSTGRES_PASSWORD: notify_password
      POSTGRES_DB: notify_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notify_user -d notify_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://notify_user:notify_password@postgres:5432/notify_db
    command: python -m uvicorn src.app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://notify_user:notify_password@postgres:5432/notify_db
    command: python -m src.app.worker_runner --poll-interval 1 --batch-size 20 --timeout 5 --visibility-timeout 300
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
